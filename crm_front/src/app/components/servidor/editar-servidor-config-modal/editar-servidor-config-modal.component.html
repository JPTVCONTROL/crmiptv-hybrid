<ion-header class="ion-no-border crm-modal-header">
  <app-crm-modal-toolbar
    titulo="Editar servidor"
    (voltar)="fechar()"
  ></app-crm-modal-toolbar>
</ion-header>

<ion-content class="crm-modal-content">
  <app-crm-modal-shell>
    <div class="crm-form-stack max-w-2xl">
      <div class="crm-card-nested">
        <p class="text-violet-300 text-xs uppercase tracking-wide">{{ servidor.codigo }}</p>
        <p class="crm-hint !mt-1">
          Cada novo cliente ou renovação consome 1 crédito deste painel.
        </p>
      </div>

      <section class="crm-modal-section">
        <h3 class="crm-modal-section-title mb-3">Painel e créditos</h3>
        <div class="crm-form-grid">
          <div class="crm-field">
            <label class="crm-label">Nome exibido *</label>
            <input class="crm-input" [(ngModel)]="form.nome" />
          </div>
          <div class="crm-field">
            <label class="crm-label">Custo por crédito (R$) *</label>
            <input
              class="crm-input"
              type="number"
              step="0.01"
              min="0"
              [(ngModel)]="form.custoUnitario"
            />
          </div>
          <div class="crm-field">
            <label class="crm-label">Saldo de créditos *</label>
            <input
              class="crm-input"
              type="number"
              step="1"
              min="0"
              [(ngModel)]="form.saldo"
            />
          </div>
          <div class="crm-field">
            <label class="crm-label">Adicionar créditos (opcional)</label>
            <input
              class="crm-input"
              type="number"
              step="1"
              min="0"
              [(ngModel)]="form.creditosAdicionar"
              placeholder="0"
            />
          </div>
        </div>
      </section>

      <section class="crm-modal-section">
        <h3 class="crm-modal-section-title mb-3">Acesso ao painel</h3>
        <div class="crm-field mb-4">
          <label class="crm-label">URL do painel</label>
          <input
            class="crm-input"
            type="url"
            [(ngModel)]="form.urlPainel"
            placeholder="https://painel.exemplo.com"
          />
        </div>
        <div class="crm-form-grid">
          <div class="crm-field">
            <label class="crm-label">Login</label>
            <input
              class="crm-input"
              [(ngModel)]="form.loginPainel"
              autocomplete="username"
            />
          </div>
          <div class="crm-field">
            <label class="crm-label">Senha</label>
            <div class="relative">
              <input
                class="crm-input pr-16"
                [type]="mostrarSenha ? 'text' : 'password'"
                [(ngModel)]="form.senhaPainel"
                autocomplete="new-password"
              />
              <button
                type="button"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs hover:text-slate-200"
                (click)="mostrarSenha = !mostrarSenha"
              >
                {{ mostrarSenha ? 'Ocultar' : 'Ver' }}
              </button>
            </div>
          </div>
        </div>
      </section>

      <label class="crm-toggle-card__label">
        <input type="checkbox" class="crm-checkbox" [(ngModel)]="form.ativo" />
        <span class="crm-toggle-card__title">Servidor ativo no cadastro de clientes</span>
      </label>
    </div>

    <div modalActions class="crm-modal-actions">
      <button type="button" class="crm-btn-ghost" [disabled]="salvando" (click)="fechar()">
        Cancelar
      </button>
      <button type="button" class="crm-btn-primary" [disabled]="salvando" (click)="salvar()">
        {{ salvando ? 'Salvando...' : 'Salvar servidor' }}
      </button>
    </div>
  </app-crm-modal-shell>
</ion-content>
