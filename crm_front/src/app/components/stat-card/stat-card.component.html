<div class="crm-card flex flex-col gap-1 h-full">
  <span class="text-slate-400 text-xs md:text-sm">{{ title }}</span>
  <span class="text-xl md:text-2xl font-bold leading-tight" [style.color]="color">{{ value }}</span>
  <span *ngIf="subtitle" class="text-slate-500 text-xs mt-0.5">{{ subtitle }}</span>
</div>
