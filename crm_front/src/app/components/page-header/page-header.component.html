<div class="crm-page-header flex flex-col lg:flex-row lg:items-start lg:justify-between gap-4">
  <div class="flex items-start gap-3 min-w-0 flex-1">
    <button
      *ngIf="mostrarVoltar"
      type="button"
      class="crm-btn-voltar shrink-0"
      aria-label="Voltar para a página anterior"
      (click)="voltar()"
    >
      <ion-icon name="arrow-back-outline" aria-hidden="true"></ion-icon>
      <span class="hidden sm:inline">Voltar</span>
    </button>

    <div class="min-w-0 flex-1">
      <nav
        *ngIf="breadcrumbs.length > 0"
        class="crm-breadcrumbs mb-1.5"
        aria-label="Navegação"
      >
        <ol class="flex flex-wrap items-center gap-1.5 list-none m-0 p-0 text-xs">
          <li
            *ngFor="let item of breadcrumbs; let last = last"
            class="inline-flex items-center gap-1.5 min-w-0"
          >
            <a
              *ngIf="item.rota && !last"
              [routerLink]="item.rota"
              class="text-slate-500 hover:text-violet-300 no-underline truncate"
            >
              {{ item.label }}
            </a>
            <span
              *ngIf="!item.rota || last"
              class="truncate"
              [class.text-slate-400]="!last"
              [class.text-slate-500]="last"
              [attr.aria-current]="last ? 'page' : null"
            >
              {{ item.label }}
            </span>
            <span *ngIf="!last" class="text-slate-600" aria-hidden="true">/</span>
          </li>
        </ol>
      </nav>
      <h1 class="crm-page-title">{{ title }}</h1>
      <p *ngIf="subtitle" class="crm-page-subtitle">{{ subtitle }}</p>
    </div>
  </div>

  <div class="flex flex-wrap items-center gap-2 shrink-0">
    <ng-content></ng-content>
    <app-alertas-sino class="hidden lg:inline-flex"></app-alertas-sino>
  </div>
</div>
