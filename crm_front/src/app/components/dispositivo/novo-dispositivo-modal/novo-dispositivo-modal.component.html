<ion-header class="ion-no-border crm-modal-header">
  <app-crm-modal-toolbar
    [titulo]="dispositivo ? 'Editar dispositivo' : 'Novo dispositivo'"
    subtitulo="Cadastre o tipo de aparelho usado pelos clientes"
    (voltar)="fechar()"
  ></app-crm-modal-toolbar>
</ion-header>

<ion-content class="crm-modal-content">
  <app-crm-modal-shell>
    <div class="space-y-5 max-w-2xl">
      <div>
        <label class="crm-label">Nome *</label>
        <input class="crm-input mt-1" [(ngModel)]="form.nome" placeholder="Fire Stick, Smart TV, TV Box..." />
      </div>

      <div>
        <label class="crm-label">Modelo</label>
        <input class="crm-input mt-1" [(ngModel)]="form.modelo" placeholder="4K, Lite, A32..." />
      </div>

      <div>
        <label class="crm-label">Descrição</label>
        <textarea class="crm-input mt-1 min-h-[100px]" [(ngModel)]="form.descricao"></textarea>
      </div>

      <label class="flex items-center gap-2 text-slate-300 text-sm">
        <input type="checkbox" class="crm-checkbox" [(ngModel)]="form.ativo" />
        Dispositivo ativo
      </label>
    </div>

    <div modalActions class="crm-modal-actions">
      <button type="button" class="crm-btn-ghost" [disabled]="salvando" (click)="fechar()">Cancelar</button>
      <button type="button" class="crm-btn-primary" [disabled]="salvando" (click)="salvar()">
        {{ salvando ? 'Salvando...' : (dispositivo ? 'Salvar alterações' : 'Salvar dispositivo') }}
      </button>
    </div>
  </app-crm-modal-shell>
</ion-content>
