<ion-header class="ion-no-border crm-modal-header">
  <app-crm-modal-toolbar
    [titulo]="campanha ? 'Editar campanha' : 'Nova campanha'"
    subtitulo="Preencha os dados e salve — você permanece na página Market"
    (voltar)="fechar()"
  ></app-crm-modal-toolbar>
</ion-header>

<ion-content class="crm-modal-content">
  <app-crm-modal-shell>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div class="space-y-5">
        <div>
          <label class="crm-label">Título</label>
          <input
            type="text"
            class="crm-input mt-1"
            [(ngModel)]="formTitulo"
            placeholder="Ex.: Férias é com a JPTV"
          />
        </div>

        <div>
          <label class="crm-label">Tipo</label>
          <select class="crm-input mt-1" [(ngModel)]="formTipo">
            <option *ngFor="let tipo of tiposCampanha" [ngValue]="tipo">
              {{ rotuloTipoCampanha(tipo) }}
            </option>
          </select>
        </div>

        <div>
          <label class="crm-label">Mensagem</label>
          <p class="text-slate-500 text-xs mt-1 mb-2">
            Personalize com <code class="text-violet-300">{{ '{' }}nome{{ '}' }}</code> · {{ empresa }}
          </p>
          <textarea
            class="crm-input mt-1 min-h-[220px] text-sm leading-relaxed"
            [(ngModel)]="formMensagem"
          ></textarea>
        </div>
      </div>

      <div class="crm-modal-preview-panel lg:sticky lg:top-0 self-start space-y-3">
        <p class="crm-section-label mb-0">Prévia WhatsApp</p>
        <p class="text-slate-500 text-xs">Como o cliente verá (exemplo: João)</p>
        <pre class="text-slate-300 text-sm whitespace-pre-wrap font-sans leading-relaxed max-h-[min(420px,50vh)] overflow-y-auto">{{ previewMensagem }}</pre>
      </div>
    </div>

    <div modalActions class="crm-modal-actions">
      <button type="button" class="crm-btn-ghost" [disabled]="salvando" (click)="fechar()">
        Cancelar
      </button>
      <button
        type="button"
        class="crm-btn-primary"
        [disabled]="salvando || !formTitulo.trim() || !formMensagem.trim()"
        (click)="salvar()"
      >
        {{ salvando ? 'Salvando...' : (campanha ? 'Salvar campanha' : 'Criar campanha') }}
      </button>
    </div>
  </app-crm-modal-shell>
</ion-content>
