<ion-header class="ion-no-border">
  <ion-toolbar class="bg-slate-900">
    <ion-title class="text-white">{{ cliente ? 'Editar Cliente' : 'Novo Cliente' }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="fechar()" class="text-slate-400">Fechar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="bg-slate-950">
  <div class="cliente-modal-shell">
    <div class="p-4 md:p-6 space-y-6 cliente-modal-body">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-slate-300 mb-2 text-sm">Nome *</label>
        <input class="crm-input" [(ngModel)]="form.nome" />
      </div>
      <div>
        <label class="block text-slate-300 mb-2 text-sm">Telefone *</label>
        <input
          class="crm-input"
          type="tel"
          inputmode="numeric"
          autocomplete="tel"
          maxlength="15"
          [ngModel]="form.telefone"
          (ngModelChange)="onTelefoneInput($event)"
          (blur)="telefoneTocado = true"
          placeholder="(62) 99999-9999"
          [class.border-red-500]="telefoneInvalido"
        />
        <p *ngIf="telefoneInvalido" class="text-red-400 text-xs mt-1">
          Informe o DDD e o número completo (10 ou 11 dígitos).
        </p>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-slate-300 mb-2 text-sm">Plano</label>
        <select class="crm-input" [(ngModel)]="form.planoId" (ngModelChange)="onPlanoChange()">
          <option [ngValue]="null">Selecione...</option>
          <optgroup *ngFor="let grupo of gruposPlanos" [label]="grupo.titulo">
            <option *ngFor="let plano of grupo.planos" [ngValue]="plano.id">
              {{ fmtRotuloPlano(plano) }}
            </option>
          </optgroup>
        </select>
      </div>
      <div>
        <label class="block text-slate-300 mb-2 text-sm">Valor Mensal *</label>
        <input class="crm-input" type="number" step="0.01" [(ngModel)]="form.valorMensal" />
      </div>
    </div>

    <div>
      <h3 class="text-white font-semibold mb-3">Credenciais IPTV</h3>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div>
          <label class="block text-slate-300 mb-2 text-sm">Servidor</label>
          <input class="crm-input" [(ngModel)]="form.servidor" />
        </div>
        <div>
          <label class="block text-slate-300 mb-2 text-sm">Usuário</label>
          <input class="crm-input" [(ngModel)]="form.usuario" />
        </div>
        <div>
          <label class="block text-slate-300 mb-2 text-sm">Senha</label>
          <input class="crm-input" [(ngModel)]="form.senha" />
        </div>
      </div>
    </div>

    <div>
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-3">
        <h3 class="text-white font-semibold">Dispositivos</h3>
        <div class="flex items-center gap-3">
          <label class="text-slate-300 text-sm whitespace-nowrap">Quantidade de telas</label>
          <select
            class="crm-input w-24 shrink-0"
            [(ngModel)]="qtdTelas"
            (ngModelChange)="onQtdTelasChange()"
          >
            <option *ngFor="let n of opcoesTelas" [ngValue]="n">{{ n }}</option>
          </select>
        </div>
      </div>

      <div
        *ngFor="let disp of dispositivosVisiveis; let i = index"
        class="rounded-lg border border-slate-800/80 bg-slate-900/40 p-4 mb-3 last:mb-0"
      >
        <p *ngIf="qtdTelas > 1" class="text-violet-400 text-sm font-medium mb-3">
          Tela {{ i + 1 }}
        </p>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div>
            <label class="block text-slate-300 mb-2 text-sm">Dispositivo</label>
            <select
              class="crm-input"
              [(ngModel)]="disp.dispositivoId"
              (ngModelChange)="onDispositivoChange(disp)"
            >
              <option [ngValue]="null">Selecione...</option>
              <option *ngFor="let d of dispositivosOpcoes" [ngValue]="d.id">
                {{ fmtRotuloDispositivo(d) }}
              </option>
            </select>
          </div>
          <div>
            <label class="block text-slate-300 mb-2 text-sm">Aplicativo</label>
            <select
              class="crm-input"
              [(ngModel)]="disp.aplicativoId"
              [disabled]="!disp.dispositivoId"
            >
              <option [ngValue]="null">
                {{ disp.dispositivoId ? 'Selecione...' : 'Escolha o dispositivo primeiro' }}
              </option>
              <option
                *ngFor="let app of aplicativosDoDispositivo(disp.dispositivoId)"
                [ngValue]="app.id"
              >
                {{ app.nome }}
              </option>
            </select>
          </div>
          <div>
            <label class="block text-slate-300 mb-2 text-sm">MAC Address</label>
            <input class="crm-input" [(ngModel)]="disp.macAddress" placeholder="00:1A:2B:3C:4D:5E" />
          </div>
        </div>
      </div>

      <button
        *ngIf="podeAdicionarDispositivo"
        type="button"
        class="crm-btn-ghost text-sm"
        (click)="adicionarDispositivo()"
      >
        + Adicionar dispositivo
      </button>
    </div>

    <div>
      <h3 class="text-white font-semibold mb-3">Datas</h3>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div>
          <label class="block text-slate-300 mb-2 text-sm">Ativado em</label>
          <input class="crm-input" type="date" [(ngModel)]="form.ativadoEm" />
        </div>
        <div>
          <label class="block text-slate-300 mb-2 text-sm">Expira em</label>
          <input class="crm-input" type="date" [(ngModel)]="form.expiraEm" (change)="onExpiraEmChange()" />
        </div>
        <div>
          <label class="block text-slate-300 mb-2 text-sm">Dia do vencimento</label>
          <input class="crm-input" type="number" min="1" max="31" [(ngModel)]="form.vencimento" />
        </div>
      </div>
    </div>

    <div>
      <label class="block text-slate-300 mb-2 text-sm">Observação</label>
      <textarea class="crm-input min-h-[80px]" [(ngModel)]="form.observacao"></textarea>
    </div>
    </div>

    <div class="cliente-modal-footer">
      <button
        type="button"
        class="crm-btn-primary w-full"
        [disabled]="salvando"
        (click)="salvar()"
      >
        {{ salvando ? 'Salvando...' : 'Salvar Cliente' }}
      </button>
    </div>
  </div>
</ion-content>
