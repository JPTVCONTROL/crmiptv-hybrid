<ion-header class="ion-no-border crm-modal-header">
  <app-crm-modal-toolbar
    [titulo]="plano ? 'Editar plano' : 'Novo plano'"
    (voltar)="fechar()"
  ></app-crm-modal-toolbar>
</ion-header>

<ion-content class="crm-modal-content">
  <app-crm-modal-shell>
    <div class="space-y-5 max-w-2xl">
      <div>
        <label class="crm-label">Nome *</label>
        <input class="crm-input mt-1" [(ngModel)]="form.nome" placeholder="Mensal, Trimestral..." />
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="crm-label">Valor (R$) *</label>
          <input class="crm-input mt-1" type="number" step="0.01" min="0" [(ngModel)]="form.valor" />
        </div>
        <div>
          <label class="crm-label">Dias de validade *</label>
          <input class="crm-input mt-1" type="number" min="1" [(ngModel)]="form.diasValidade" />
        </div>
      </div>
      <label class="flex items-center gap-2 text-slate-300 text-sm">
        <input type="checkbox" class="crm-checkbox" [(ngModel)]="form.ativo" />
        Plano ativo
      </label>
    </div>

    <div modalActions class="crm-modal-actions">
      <button type="button" class="crm-btn-ghost" [disabled]="salvando" (click)="fechar()">Cancelar</button>
      <button type="button" class="crm-btn-primary" [disabled]="salvando" (click)="salvar()">
        {{ salvando ? 'Salvando...' : 'Salvar plano' }}
      </button>
    </div>
  </app-crm-modal-shell>
</ion-content>
