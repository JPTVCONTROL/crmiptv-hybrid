<ion-header class="ion-no-border crm-modal-header">
  <app-crm-modal-toolbar
    [titulo]="'Clientes — ' + plano.nome"
    subtitulo="Lista de clientes vinculados a este plano"
    (voltar)="fechar()"
  ></app-crm-modal-toolbar>
</ion-header>

<ion-content class="crm-modal-content">
  <app-crm-modal-shell [comRodape]="false">
    <app-loading *ngIf="loading" variant="spinner"></app-loading>
    <p *ngIf="erro" class="text-red-400">{{ erro }}</p>

    <div *ngIf="!loading && !erro" class="space-y-3">
      <p class="text-slate-400 text-sm">
        {{ clientes.length }}
        {{ clientes.length === 1 ? 'cliente vinculado' : 'clientes vinculados' }}
        a este plano
      </p>

      <div
        *ngFor="let cliente of clientes"
        class="rounded-lg border border-slate-800 bg-slate-900/40 p-3 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3"
      >
        <div class="min-w-0">
          <a
            [routerLink]="['/clientes', cliente.id]"
            class="text-white font-medium no-underline hover:text-violet-300 block truncate"
            (click)="fechar()"
          >
            {{ cliente.nome }}
          </a>
          <p class="text-slate-400 text-sm mt-1">{{ cliente.telefone }}</p>
        </div>
        <div class="flex flex-wrap gap-2 shrink-0 self-start sm:self-auto">
          <button type="button" class="crm-btn-ghost" (click)="editar(cliente)">Editar</button>
          <a
            [routerLink]="['/clientes', cliente.id]"
            class="crm-btn-ghost no-underline"
            (click)="fechar()"
          >
            Ver cliente
          </a>
        </div>
      </div>

      <app-empty-state
        *ngIf="clientes.length === 0"
        message="Nenhum cliente vinculado a este plano."
      ></app-empty-state>
    </div>
  </app-crm-modal-shell>
</ion-content>
