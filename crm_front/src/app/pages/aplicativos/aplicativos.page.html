<div class="flex flex-col sm:flex-row sm:justify-between gap-4 mb-4">
  <app-page-header title="Aplicativos" subtitle="Gerencie todos os aplicativos da JPTV."></app-page-header>
  <button class="crm-btn-primary shrink-0" (click)="novo()">+ Novo Aplicativo</button>
</div>

<app-loading *ngIf="loading"></app-loading>
<p *ngIf="error" class="text-red-400 mb-4">{{ error }}</p>

<div *ngIf="!loading" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 md:gap-6">
  <div *ngFor="let app of aplicativos" class="crm-card hover:border-violet-600 transition-colors">
    <div class="flex items-center gap-4 mb-4">
      <div class="w-14 h-14 rounded-xl bg-slate-800 flex items-center justify-center overflow-hidden">
        <img *ngIf="app.logo" [src]="app.logo" [alt]="app.nome" class="w-full h-full object-cover" />
        <span *ngIf="!app.logo" class="text-2xl">📱</span>
      </div>
      <div>
        <h3 class="text-white font-semibold">{{ app.nome }}</h3>
        <p class="text-slate-400 text-sm">{{ app._count?.clientes ?? 0 }} clientes</p>
      </div>
    </div>
    <p class="text-slate-400 text-sm line-clamp-2">{{ app.descricao || 'Sem descrição' }}</p>
  </div>
</div>

<app-empty-state *ngIf="!loading && aplicativos.length === 0"></app-empty-state>
