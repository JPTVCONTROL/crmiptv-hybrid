<div *ngIf="!loading" class="flex justify-end mb-4">
  <button class="crm-btn-primary shrink-0" (click)="abrirModal()">+ Novo Aplicativo</button>
</div>

<div *ngIf="!loading" class="crm-card !p-4 mb-4 flex flex-col sm:flex-row gap-3">
  <input
    type="search"
    class="crm-input flex-1"
    placeholder="Buscar aplicativo..."
    [(ngModel)]="busca"
  />
  <select class="crm-input sm:max-w-[10rem]" [(ngModel)]="filtroAtivo">
    <option value="TODOS">Todos</option>
    <option value="ATIVO">Ativos</option>
    <option value="INATIVO">Inativos</option>
  </select>
</div>

<app-loading *ngIf="loading"></app-loading>
<p *ngIf="error" class="text-red-400 mb-4">{{ error }}</p>

<div *ngIf="!loading" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 md:gap-6">
  <div
    *ngFor="let app of aplicativosFiltrados"
    class="crm-card hover:border-violet-600 transition-colors flex flex-col cursor-pointer"
    [class.opacity-60]="!app.ativo"
    (click)="verClientes(app)"
  >
    <div class="flex items-start gap-4 mb-3">
      <div class="w-16 h-16 rounded-xl bg-slate-800 border border-slate-700 flex items-center justify-center overflow-hidden shrink-0">
        <img
          *ngIf="mostrarLogo(app)"
          [src]="app.logo!"
          [alt]="app.nome"
          class="w-full h-full object-cover"
          (error)="logoQuebrado(app.id)"
        />
        <span *ngIf="!mostrarLogo(app)" class="text-2xl">📱</span>
      </div>
      <div class="min-w-0 flex-1">
        <div class="flex items-start justify-between gap-2">
          <h3 class="text-white font-semibold truncate">{{ app.nome }}</h3>
          <span
            class="text-xs px-2 py-0.5 rounded shrink-0"
            [class.bg-green-600]="app.ativo"
            [class.bg-slate-700]="!app.ativo"
          >
            {{ app.ativo ? 'Ativo' : 'Inativo' }}
          </span>
        </div>
        <button
          type="button"
          class="crm-contador-clientes"
          [class.crm-contador-clientes--ativo]="(app._count?.clientes ?? 0) > 0"
          [class.crm-contador-clientes--vazio]="(app._count?.clientes ?? 0) === 0"
          (click)="verClientes(app, $event)"
        >
          <span class="font-semibold tabular-nums">{{ app._count?.clientes ?? 0 }}</span>
          <span>{{ (app._count?.clientes ?? 0) === 1 ? 'cliente' : 'clientes' }}</span>
        </button>
      </div>
    </div>

    <p class="text-slate-400 text-sm line-clamp-2 flex-1 mb-3">
      {{ app.descricao || 'Sem descrição' }}
    </p>

    <div
      *ngIf="app.requerMac || app.requerDeviceKey || app.requerCodigo"
      class="flex flex-wrap gap-1.5 mb-4"
    >
      <span *ngIf="app.requerMac" class="text-xs px-2 py-0.5 rounded bg-slate-800 text-slate-300 border border-slate-700">
        MAC
      </span>
      <span *ngIf="app.requerDeviceKey" class="text-xs px-2 py-0.5 rounded bg-slate-800 text-slate-300 border border-slate-700">
        Device Key
      </span>
      <span *ngIf="app.requerCodigo" class="text-xs px-2 py-0.5 rounded bg-slate-800 text-slate-300 border border-slate-700">
        Código
      </span>
    </div>

    <div class="flex gap-2 mt-auto" (click)="$event.stopPropagation()">
      <button type="button" class="crm-btn-ghost flex-1" (click)="abrirModal(app)">Editar</button>
      <button type="button" class="crm-btn-danger flex-1" (click)="excluir(app)">Excluir</button>
    </div>
  </div>
</div>

<app-empty-state *ngIf="!loading && aplicativos.length === 0"></app-empty-state>
