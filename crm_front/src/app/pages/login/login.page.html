<div class="crm-auth-shell">
  <div class="w-full max-w-md space-y-6 relative z-[1]">
    <div class="text-center space-y-3">
      <img
        src="assets/logo-crm-jptv.png"
        alt="CRM JPTV"
        class="h-16 w-auto mx-auto drop-shadow-lg"
      />
      <div>
        <h1 class="crm-page-title">Entrar</h1>
        <p class="crm-page-subtitle">Acesse o painel de gestão IPTV</p>
      </div>
    </div>

    <form class="crm-auth-card" [formGroup]="form" (ngSubmit)="entrar()">
      <div>
        <label class="block text-slate-400 text-sm mb-1.5 font-medium" for="email">E-mail</label>
        <input
          id="email"
          type="email"
          class="crm-input"
          formControlName="email"
          autocomplete="username"
          placeholder="admin@jptv.com.br"
        />
      </div>

      <div>
        <label class="block text-slate-400 text-sm mb-1.5 font-medium" for="senha">Senha</label>
        <div class="relative">
          <input
            id="senha"
            [type]="mostrarSenha ? 'text' : 'password'"
            class="crm-input pr-24"
            formControlName="senha"
            autocomplete="current-password"
            placeholder="••••••••"
          />
          <button
            type="button"
            class="absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 text-xs px-2 py-1 rounded-lg hover:text-slate-200 hover:bg-slate-800/80 transition-colors"
            (click)="alternarSenha()"
          >
            {{ mostrarSenha ? 'Ocultar' : 'Mostrar' }}
          </button>
        </div>
      </div>

      <p *ngIf="erro" class="text-red-400 text-sm bg-red-500/10 border border-red-500/20 rounded-xl px-3 py-2">{{ erro }}</p>

      <button
        type="submit"
        class="crm-btn-primary w-full !py-3"
        [disabled]="carregando"
      >
        {{ carregando ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>
  </div>
</div>
