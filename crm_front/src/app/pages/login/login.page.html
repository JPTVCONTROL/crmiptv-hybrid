<div class="crm-auth-page" [class.crm-auth-page--app]="ehAppNativo">
  <div class="crm-auth-ambient" aria-hidden="true">
    <span class="crm-auth-glow crm-auth-glow--violet"></span>
    <span class="crm-auth-glow crm-auth-glow--cyan"></span>
    <span class="crm-auth-glow crm-auth-glow--rose"></span>
  </div>

  <div class="crm-auth-body">
    <div class="crm-auth-orbit-scene" *ngIf="!ehAppNativo">
      <div class="crm-auth-orbit" aria-label="Recursos do CRM JPTV">
        <div class="crm-auth-orbit-arc">
          <div class="crm-auth-orbit-ring crm-auth-orbit-ring--arc" aria-hidden="true"></div>
          <div class="crm-auth-orbit-ring crm-auth-orbit-ring--inner crm-auth-orbit-ring--arc" aria-hidden="true"></div>

          <article
            *ngFor="let item of destaques; let i = index"
            class="crm-auth-feature crm-auth-feature--orbit"
            [attr.data-tone]="item.tom"
            [style.--auth-angle]="anguloOrbita(i)"
            [style.--auth-delay]="i * 0.35 + 's'"
          >
            <div class="crm-auth-feature-icon" aria-hidden="true">
              <ion-icon [name]="item.icon"></ion-icon>
            </div>
            <div class="crm-auth-feature-body">
              <h3 class="crm-auth-feature-title">{{ item.titulo }}</h3>
              <p class="crm-auth-feature-text">{{ item.descricao }}</p>
            </div>
          </article>
        </div>
      </div>
    </div>

    <div class="crm-auth-crown-scene" aria-hidden="true">
      <div class="crm-auth-orbit">
        <header class="crm-auth-orbit-logo crm-auth-orbit-logo--crown">
          <img src="assets/logo-crm-jptv.png" alt="" class="crm-auth-orbit-logo-img" />
          <p class="crm-auth-orbit-logo-tagline">Gestão IPTV completa</p>
        </header>
      </div>
    </div>

    <main class="crm-auth-stage">
      <header class="crm-auth-hero crm-auth-hero--mobile">
        <img src="assets/logo-crm-jptv.png" alt="CRM JPTV" class="crm-auth-hero-logo" />
        <p class="crm-auth-hero-tagline">Gestão IPTV completa</p>
      </header>

      <form class="crm-auth-card" [formGroup]="form" (ngSubmit)="entrar()">
        <div class="crm-auth-card-head">
          <h1 class="crm-auth-card-title">Entrar</h1>
          <p class="crm-auth-card-subtitle">Use seu e-mail e senha de acesso</p>
        </div>

        <div>
          <label class="crm-auth-label" for="email">E-mail</label>
          <input
            id="email"
            type="email"
            class="crm-input"
            formControlName="email"
            autocomplete="username"
            placeholder="admin@jptv.com.br"
          />
        </div>

        <div>
          <label class="crm-auth-label" for="senha">Senha</label>
          <div class="relative">
            <input
              id="senha"
              [type]="mostrarSenha ? 'text' : 'password'"
              class="crm-input pr-24"
              formControlName="senha"
              autocomplete="current-password"
              placeholder="••••••••"
            />
            <button
              type="button"
              class="crm-auth-toggle-senha"
              (click)="alternarSenha()"
            >
              {{ mostrarSenha ? 'Ocultar' : 'Mostrar' }}
            </button>
          </div>
        </div>

        <div class="crm-auth-opcoes">
          <label class="crm-auth-check">
            <input
              type="checkbox"
              class="crm-checkbox"
              [(ngModel)]="salvarDados"
              [ngModelOptions]="{ standalone: true }"
            />
            Salvar dados
          </label>
          <label class="crm-auth-check">
            <input
              type="checkbox"
              class="crm-checkbox"
              [(ngModel)]="manterConectado"
              [ngModelOptions]="{ standalone: true }"
            />
            Manter conectado
          </label>
        </div>

        <p *ngIf="erro" class="crm-auth-erro">{{ erro }}</p>

        <button
          type="submit"
          class="crm-btn-primary crm-auth-submit w-full"
          [disabled]="carregando"
        >
          {{ carregando ? 'Entrando...' : 'Entrar' }}
        </button>

        <div *ngIf="mostrarAtualizacaoApp" class="crm-auth-app-update">
          <p *ngIf="statusApp" class="crm-auth-app-update-text">{{ statusApp }}</p>
          <button
            type="button"
            class="crm-btn-ghost w-full !py-2.5 text-sm"
            [disabled]="atualizandoApp"
            (click)="atualizarApp()"
          >
            {{
              atualizandoApp
                ? 'Atualizando...'
                : novaVersaoApp
                  ? 'Atualizar app (nova versao)'
                  : 'Atualizar app'
            }}
          </button>
        </div>
      </form>
    </main>
  </div>
</div>
