<app-page-header title="Vencimentos" subtitle="Mensalidades pendentes ordenadas por data."></app-page-header>

<app-loading *ngIf="loading"></app-loading>

<div *ngIf="!loading" class="space-y-6">
  <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
    <app-stat-card title="Total Pendente" [value]="totalPendente" color="#F59E0B"></app-stat-card>
    <app-stat-card title="Vencem Hoje" [value]="vencemHoje.toString()" color="#EF4444"></app-stat-card>
    <app-stat-card title="Atrasados" [value]="atrasados.toString()" color="#DC2626"></app-stat-card>
  </div>

  <div class="flex flex-col sm:flex-row flex-wrap gap-2 items-stretch sm:items-center">
    <button
      class="crm-btn-primary"
      [disabled]="qtdSelecionados === 0"
      (click)="cobrarSelecionados()"
    >
      Cobrar selecionados ({{ qtdSelecionados }})
    </button>
    <button class="crm-btn-ghost" (click)="selecionarAtrasados()">
      Selecionar atrasados
    </button>
    <button
      class="crm-btn-ghost"
      [disabled]="atrasados === 0"
      (click)="cobrarAtrasados()"
    >
      Cobrar todos atrasados ({{ atrasados }})
    </button>
    <button
      class="crm-btn-ghost"
      [disabled]="qtdSelecionados === 0"
      (click)="limparSelecao()"
    >
      Limpar seleção
    </button>
  </div>

  <div class="crm-card overflow-x-auto">
    <table class="w-full text-sm min-w-[700px]">
      <thead>
        <tr class="text-slate-400 border-b border-slate-800">
          <th class="text-left py-3 px-2 w-10">
            <input
              type="checkbox"
              class="rounded border-slate-600"
              [checked]="todosSelecionados"
              (change)="alternarTodos()"
            />
          </th>
          <th class="text-left py-3 px-2">Cliente</th>
          <th class="text-left py-3 px-2">Referência</th>
          <th class="text-left py-3 px-2">Valor</th>
          <th class="text-left py-3 px-2">Vencimento</th>
          <th class="text-left py-3 px-2">Status</th>
          <th class="text-right py-3 px-2">Ações</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let m of mensalidades; trackBy: trackByMensalidade" class="border-b border-slate-800/50">
          <td class="py-3 px-2">
            <input
              type="checkbox"
              class="rounded border-slate-600"
              [checked]="estaSelecionado(m)"
              (change)="alternarSelecao(m)"
            />
          </td>
          <td class="py-3 px-2">
            <a [routerLink]="['/clientes', m.clienteId]" class="text-violet-400 hover:underline">{{ m.cliente?.nome }}</a>
          </td>
          <td class="py-3 px-2 text-slate-300">{{ m.referencia }}</td>
          <td class="py-3 px-2 text-slate-300">{{ fmtValor(m.valor) }}</td>
          <td class="py-3 px-2 text-slate-300">{{ fmtData(m.vencimento) }}</td>
          <td class="py-3 px-2 text-amber-400 text-xs">{{ statusLabel(m) }}</td>
          <td class="py-3 px-2 text-right space-x-1">
            <app-whatsapp-cobranca-btn [telefone]="telefone(m)" [mensagem]="mensagem(m)"></app-whatsapp-cobranca-btn>
            <app-whatsapp-cobranca-btn
              *ngIf="mensalidadeAtrasada(m.vencimento)"
              label="Bloqueio"
              [telefone]="telefone(m)"
              [mensagem]="mensagemBloqueio(m)"
            ></app-whatsapp-cobranca-btn>
            <button class="crm-btn-success" (click)="pagar(m)">Pagar</button>
          </td>
        </tr>
      </tbody>
    </table>
    <app-empty-state *ngIf="mensalidades.length === 0"></app-empty-state>
  </div>
</div>
