<div class="crm-page-shell">
  <app-page-header title="Servidores" rotaVoltar="/catalogos">
    <button class="crm-btn-primary shrink-0" (click)="abrirModal()">+ Novo Servidor</button>
  </app-page-header>

  <div *ngIf="!loading" class="crm-sticky-toolbar">
    <div class="crm-card !p-4 flex flex-col sm:flex-row gap-3">
      <input
        type="search"
        class="crm-input flex-1"
        placeholder="Buscar servidor..."
        [(ngModel)]="busca"
      />
      <select class="crm-input sm:max-w-[10rem]" [(ngModel)]="filtroAtivo">
        <option value="TODOS">Todos</option>
        <option value="ATIVO">Ativos</option>
        <option value="INATIVO">Inativos</option>
      </select>
    </div>
  </div>

  <app-loading *ngIf="loading" variant="cards"></app-loading>
  <p *ngIf="error" class="text-red-400">{{ error }}</p>

  <div *ngIf="!loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
    <article
      *ngFor="let servidor of servidoresFiltrados"
      class="crm-card-selectable !p-4"
      [class.opacity-60]="servidor.ativo === false"
    >
      <div class="flex items-start justify-between gap-2 mb-3">
        <div class="min-w-0">
          <p class="text-violet-300 text-xs uppercase tracking-wide">{{ servidor.codigo }}</p>
          <h3 class="crm-card-title text-sm truncate">{{ servidor.nome }}</h3>
          <p class="text-slate-400 text-xs mt-1">
            {{ fmtValor(servidor.custoUnitario) }}/crédito · Saldo: {{ servidor.saldo }}
          </p>
        </div>
        <span [class]="servidor.ativo !== false ? 'crm-badge-ativo' : 'crm-badge-inativo'">
          {{ servidor.ativo !== false ? 'Ativo' : 'Inativo' }}
        </span>
      </div>

      <p class="text-slate-500 text-xs mb-3">
        Configure login, senha e URL em Configurações → Servidores.
      </p>

      <div class="flex flex-wrap gap-2">
        <button class="crm-btn-ghost flex-1 !py-1.5 !text-xs" (click)="abrirModal(servidor)">
          Editar
        </button>
        <button class="crm-btn-danger flex-1 !py-1.5 !text-xs" (click)="excluir(servidor)">
          Excluir
        </button>
      </div>
    </article>
  </div>

  <app-empty-state
    *ngIf="!loading && servidores.length === 0"
    title="Nenhum servidor cadastrado"
    message="Crie servidores para vincular aos clientes e controlar créditos."
    iconName="server-outline"
    actionLabel="+ Novo servidor"
    (action)="abrirModal()"
  ></app-empty-state>

  <app-empty-state
    *ngIf="!loading && servidores.length > 0 && servidoresFiltrados.length === 0"
    title="Nenhum servidor encontrado"
    message="Ajuste a busca ou o filtro de status."
    iconName="search-outline"
  ></app-empty-state>
</div>
