<div class="flex flex-col sm:flex-row sm:justify-between gap-4 mb-4">
  <app-page-header title="Dispositivos" subtitle="Cadastre os aparelhos disponíveis para vincular aos clientes."></app-page-header>
  <button class="crm-btn-primary shrink-0" (click)="abrirModal()">+ Novo Dispositivo</button>
</div>

<app-loading *ngIf="loading"></app-loading>
<p *ngIf="error" class="text-red-400 mb-4">{{ error }}</p>

<div *ngIf="!loading" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 md:gap-6">
  <div
    *ngFor="let item of dispositivos"
    class="crm-card hover:border-violet-600 transition-colors flex flex-col"
    [class.opacity-60]="!item.ativo"
  >
    <div class="flex items-start gap-4 mb-3">
      <div class="w-16 h-16 rounded-xl bg-slate-800 border border-slate-700 flex items-center justify-center overflow-hidden shrink-0">
        <span class="text-2xl">📺</span>
      </div>
      <div class="min-w-0 flex-1">
        <div class="flex items-start justify-between gap-2">
          <h3 class="text-white font-semibold truncate">{{ rotulo(item) }}</h3>
          <span
            class="text-xs px-2 py-0.5 rounded shrink-0"
            [class.bg-green-600]="item.ativo"
            [class.bg-slate-700]="!item.ativo"
          >
            {{ item.ativo ? 'Ativo' : 'Inativo' }}
          </span>
        </div>
        <p class="text-slate-400 text-sm mt-1">{{ item._count?.clientes ?? 0 }} clientes</p>
      </div>
    </div>

    <p class="text-slate-400 text-sm line-clamp-2 flex-1 mb-4">
      {{ item.descricao || 'Sem descrição' }}
    </p>

    <div class="flex gap-2 mt-auto">
      <button class="crm-btn-ghost flex-1" (click)="abrirModal(item)">Editar</button>
      <button class="crm-btn-danger flex-1" (click)="excluir(item)">Excluir</button>
    </div>
  </div>
</div>

<app-empty-state *ngIf="!loading && dispositivos.length === 0" message="Nenhum dispositivo cadastrado."></app-empty-state>
