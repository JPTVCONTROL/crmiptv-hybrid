<app-page-header title="Catálogos" [subtitle]="subtituloAtual"></app-page-header>

<nav class="flex flex-wrap gap-2 mb-6" aria-label="Abas de catálogos">
  <a
    *ngFor="let aba of abas"
    [routerLink]="aba.rota"
    class="inline-flex items-center px-4 py-2 rounded-lg border text-sm font-medium transition-colors no-underline"
    [ngClass]="classesAba(aba.rota)"
  >
    {{ aba.rotulo }}
  </a>
</nav>

<router-outlet></router-outlet>
