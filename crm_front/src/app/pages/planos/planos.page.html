<div class="space-y-6">
  <app-page-header
    title="Planos"
    subtitle="Planos de assinatura e valores mensais."
    rotaVoltar="/catalogos"
  >
    <button class="crm-btn-primary shrink-0" (click)="abrirModal()">+ Novo Plano</button>
  </app-page-header>

  <div *ngIf="!loading" class="crm-sticky-toolbar">
    <div class="crm-card !p-4 flex flex-col sm:flex-row gap-3">
    <input type="search" class="crm-input flex-1" placeholder="Buscar plano..." [(ngModel)]="busca" />
    <select class="crm-input sm:max-w-[10rem]" [(ngModel)]="filtroAtivo">
      <option value="TODOS">Todos</option>
      <option value="ATIVO">Ativos</option>
      <option value="INATIVO">Inativos</option>
    </select>
    </div>
  </div>

  <app-loading *ngIf="loading" variant="cards"></app-loading>
  <p *ngIf="error" class="text-red-400">{{ error }}</p>

  <div *ngIf="!loading" class="space-y-5">
    <section *ngFor="let grupo of gruposVisiveis">
      <h2 class="crm-section-label">{{ grupo.titulo }}</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
        <div
          *ngFor="let plano of grupo.planos"
          class="crm-card !p-3 hover:border-violet-600 transition-colors cursor-pointer"
          [class.opacity-60]="!plano.ativo"
          (click)="verClientes(plano)"
        >
          <div class="flex items-start justify-between gap-2 mb-2">
            <div class="min-w-0">
              <h3 class="crm-card-title text-sm truncate">
                {{ plano.nome.split(' - ').slice(1).join(' - ') || plano.nome }}
              </h3>
              <p class="text-violet-400 font-bold text-base mt-0.5">{{ fmtValor(plano.valor) }}</p>
            </div>
            <span [class]="plano.ativo ? 'crm-badge-ativo' : 'crm-badge-inativo'">
              {{ plano.ativo ? 'Ativo' : 'Inativo' }}
            </span>
          </div>

          <div class="space-y-0.5 text-xs text-slate-400 mb-2.5">
            <p>{{ rotuloValidade(plano) }} de validade</p>
            <button
              type="button"
              class="crm-contador-clientes !mt-0"
              [class.crm-contador-clientes--ativo]="(plano._count?.clientes ?? 0) > 0"
              [class.crm-contador-clientes--vazio]="(plano._count?.clientes ?? 0) === 0"
              (click)="verClientes(plano); $event.stopPropagation()"
            >
              <span class="font-semibold tabular-nums">{{ plano._count?.clientes ?? 0 }}</span>
              <span>{{ (plano._count?.clientes ?? 0) === 1 ? 'cliente' : 'clientes' }}</span>
            </button>
          </div>

          <div class="flex flex-wrap gap-2" (click)="$event.stopPropagation()">
            <button class="crm-btn-ghost flex-1 !py-1.5 !text-xs" (click)="abrirModal(plano)">Editar</button>
            <button
              *ngIf="(plano._count?.clientes ?? 0) > 0"
              class="crm-btn-ghost flex-1 !py-1.5 !text-xs"
              (click)="reajustarClientes(plano)"
            >
              Reajustar
            </button>
            <button class="crm-btn-danger flex-1 !py-1.5 !text-xs" (click)="excluir(plano)">Excluir</button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <app-empty-state
    *ngIf="!loading && planos.length === 0"
    title="Nenhum plano cadastrado"
    message="Crie planos para vincular aos clientes."
    iconName="albums-outline"
    actionLabel="+ Novo plano"
    (action)="abrirModal()"
  ></app-empty-state>
  <app-empty-state
    *ngIf="!loading && planos.length > 0 && planosFiltrados.length === 0"
    title="Nenhum plano encontrado"
    message="Ajuste a busca ou o filtro de status."
    iconName="search-outline"
  ></app-empty-state>
</div>
