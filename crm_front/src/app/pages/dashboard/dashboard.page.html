<app-page-header title="Dashboard" subtitle="Bem-vindo ao CRM JPTV."></app-page-header>

<app-loading *ngIf="loading"></app-loading>

<div *ngIf="!loading" class="space-y-6 md:space-y-8">
  <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 md:gap-5">
    <app-stat-card title="Clientes Ativos" [value]="clientesAtivos.toString()" color="#A855F7"></app-stat-card>
    <app-stat-card title="Recebido" [value]="totalRecebido" color="#22C55E"></app-stat-card>
    <app-stat-card title="Pendentes" [value]="pendentes.toString()" color="#EF4444"></app-stat-card>
    <app-stat-card title="Vencem Hoje" [value]="vencemHoje.toString()" color="#F59E0B"></app-stat-card>
  </div>

  <div class="grid grid-cols-1 xl:grid-cols-3 gap-4 md:gap-6">
    <div class="crm-card xl:col-span-2">
      <h2 class="text-white font-semibold mb-4">Faturamento Mensal</h2>
      <div *ngIf="faturamentoMensal.length === 0" class="text-slate-500 text-sm">Sem dados de pagamento.</div>
      <div class="flex items-end gap-3 h-48" *ngIf="faturamentoMensal.length > 0">
        <div *ngFor="let mes of faturamentoMensal" class="flex-1 flex flex-col items-center gap-2">
          <div
            class="w-full bg-violet-600 rounded-t-md transition-all"
            [style.height.%]="(mes.valor / maxFaturamento()) * 100"
          ></div>
          <span class="text-xs text-slate-400 text-center">{{ mes.label }}</span>
        </div>
      </div>
    </div>

    <div class="crm-card">
      <h2 class="text-white font-semibold mb-4">Próximos Vencimentos</h2>
      <div class="space-y-3">
        <div
          *ngFor="let m of proximosVencimentos"
          class="flex justify-between items-center border-b border-slate-800 pb-2 last:border-0"
        >
          <div>
            <p class="text-white text-sm font-medium">{{ m.cliente?.nome ?? 'Cliente' }}</p>
            <p class="text-slate-400 text-xs">{{ m.referencia }}</p>
          </div>
          <span class="text-amber-400 text-sm">{{ m.vencimento | date:'dd/MM/yyyy' }}</span>
        </div>
        <app-empty-state *ngIf="proximosVencimentos.length === 0" message="Nenhum vencimento pendente."></app-empty-state>
      </div>
    </div>
  </div>
</div>
