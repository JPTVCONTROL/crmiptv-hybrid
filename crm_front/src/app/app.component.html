<ion-app class="bg-slate-950">
  <ion-split-pane contentId="main-content" when="lg">
    <ion-menu contentId="main-content" type="overlay" class="crm-menu">
      <ion-content class="bg-slate-900">
        <div class="p-5 border-b border-slate-800">
          <h1 class="text-2xl md:text-3xl font-black text-purple-500">CRM JPTV</h1>
          <p class="text-sm text-slate-400 mt-1">Sistema de Gestão IPTV</p>
        </div>

        <ion-list lines="none" class="bg-transparent p-3">
          <ion-menu-toggle *ngFor="let menu of menus" auto-hide="false">
            <ion-item
              [routerLink]="menu.rota"
              routerLinkActive="menu-active"
              [routerLinkActiveOptions]="{ exact: menu.rota === '/dashboard' }"
              detail="false"
              class="rounded-xl mb-1 text-white"
            >
              <ion-icon [name]="menu.icon" slot="start" class="text-purple-400"></ion-icon>
              <ion-label>{{ menu.nome }}</ion-label>
            </ion-item>
          </ion-menu-toggle>
        </ion-list>

        <div class="absolute bottom-0 left-0 right-0 border-t border-slate-800 p-4 text-xs text-slate-500">
          CRM JPTV v1.0
        </div>
      </ion-content>
    </ion-menu>

    <div class="ion-page" id="main-content">
      <ion-header class="ion-no-border lg:hidden">
        <ion-toolbar class="bg-slate-900">
          <ion-buttons slot="start">
            <ion-menu-button class="text-white"></ion-menu-button>
          </ion-buttons>
          <ion-title class="text-purple-500 font-bold">CRM JPTV</ion-title>
        </ion-toolbar>
      </ion-header>

      <ion-content class="bg-slate-950">
        <div class="p-4 md:p-6 lg:p-8">
          <router-outlet></router-outlet>
        </div>
      </ion-content>
    </div>
  </ion-split-pane>
</ion-app>
