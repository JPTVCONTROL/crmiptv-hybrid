<ion-app class="bg-slate-950">
  <ion-split-pane contentId="main-content" when="lg">
    <ion-menu
      *ngIf="!isLoginRoute"
      contentId="main-content"
      type="overlay"
      class="crm-menu"
    >
      <ion-content class="menu-content" [scrollY]="false">
        <div class="menu-shell">
          <div class="menu-header">
            <img
              src="assets/logo-crm-jptv.png"
              alt="CRM JPTV"
              class="menu-logo"
            />
            <p class="menu-subtitle">Sistema de Gestão IPTV</p>
            <p *ngIf="usuario" class="menu-user">{{ usuario.nome }}</p>
          </div>

          <nav class="menu-nav">
            <a
              *ngFor="let menu of menus"
              [routerLink]="menu.rota"
              routerLinkActive="menu-link-active"
              [routerLinkActiveOptions]="{ exact: menu.rota === '/dashboard' }"
              class="menu-link"
              (click)="fecharMenu()"
            >
              <ion-icon [name]="menu.icon" aria-hidden="true"></ion-icon>
              <span>{{ menu.nome }}</span>
            </a>
          </nav>

          <div class="menu-footer space-y-3">
            <button type="button" class="menu-link menu-link-logout w-full" (click)="sair()">
              <ion-icon name="log-out-outline" aria-hidden="true"></ion-icon>
              <span>Sair</span>
            </button>
            <p>CRM JPTV v1.0</p>
          </div>
        </div>
      </ion-content>
    </ion-menu>

    <div class="ion-page" id="main-content">
      <ion-header *ngIf="!isLoginRoute" class="ion-no-border lg:hidden">
        <ion-toolbar class="bg-slate-900">
          <ion-buttons slot="start">
            <ion-menu-button class="text-white"></ion-menu-button>
          </ion-buttons>
          <ion-title class="mobile-logo-title">
            <img src="assets/logo-crm-jptv.png" alt="CRM JPTV" class="mobile-logo" />
          </ion-title>
          <ion-buttons slot="end">
            <app-alertas-sino></app-alertas-sino>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>

      <ion-content class="bg-slate-950">
        <div [class]="isLoginRoute ? 'login-shell' : 'app-content-shell p-4 md:p-6 lg:p-8'">
          <router-outlet></router-outlet>
        </div>
      </ion-content>
    </div>
  </ion-split-pane>
</ion-app>
